# 一次构建同时产出 Windows 与 macOS 可执行程序
# 使用：推送到 GitHub 后到 Actions 页运行，或 push 时自动运行，从 Artifacts 下载两个平台的产物

name: Build Peko (Windows + macOS)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Build
        run: pyinstaller main.spec
        working-directory: ${{ github.workspace }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Peko-Windows
          path: dist/Peko.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Build
        run: pyinstaller main.spec
        working-directory: ${{ github.workspace }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Peko-macOS
          path: dist/Peko
